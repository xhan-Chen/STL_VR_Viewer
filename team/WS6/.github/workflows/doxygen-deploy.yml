name: doxygen-deploy

on:
  push:
    branches: [master]


jobs:
  deploy-ws6:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install doxygen
        run: sudo apt-get install -y doxygen

      - name: Run Doxygen
        working-directory: ${{ github.workspace }}/WS6
        run: doxygen Doxyfile

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4.2.5
        with:
          branch: gh-pages
          folder: ${{github.workspace}}/WS6/html